spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

server:
  port: 8080

# 인플루언서 설정 (설정값으로 관리)
influencer:
  user-id: 1

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000
  refresh-token-expiry: 1209600000
